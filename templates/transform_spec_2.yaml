# Plan9Cog Cognitive DevKernel — Transform Specification
#
# This file defines the function-creator domain mapping for
# transforming tc (file management) and time-crystal-nn (temporal hierarchy)
# into the Plan 9 cognitive kernel domain.
#
# Composition: function-creator(inferno-devcontainer(manuscog) => plan9-analogue)

source_skills:
  - name: tc
    domain: file-management
    description: "Total Commander file operations"
  - name: time-crystal-nn
    domain: temporal-hierarchy
    description: "Nanobrain time crystal neural networks"

source_enrichment:
  name: manuscog-cognitive-devkernel
  domain: cognitive-kernel
  description: "ManusCog cognitive development kernel (Inferno-OS)"

target_skill:
  name: plan9-cognitive-devkernel
  domain: plan9-os
  description: "Plan 9 from Bell Labs cognitive development kernel"

# Inferno → Plan 9 infrastructure mappings
inferno_to_plan9:
  term_mappings:
    "Inferno-OS":        "Plan 9 from Bell Labs"
    "emu":               "cpu server / QEMU"
    "Limbo":             "Plan 9 C"
    "Dis VM":            "native execution"
    "Styx":              "9P2000"
    "Docker cluster":    "CPU server grid"
    "devcontainer":      "plan9-devenv"
    "VS Code":           "acme"
    "post-create.sh":    "cpurc"
    "post-start.sh":     "termrc"
    "port 6666":         "port 564"

# tc → Cognitive 9P2000 Namespace mappings
tc_mappings:
  term_mappings:
    "file system":       "9P2000 namespace"
    "directory":         "service group"
    "file":              "atom/rule/agent"
    "file properties":   "atom metadata (type, STI, LTI, truth value)"
    "search":            "grep -r over /cognitive/"
    "copy":              "cp across mount points"
    "move":              "mv within namespace"
    "archive pack":      "fossil snapshot"
    "archive unpack":    "fossil restore from venti"
    "batch rename":      "for loop in rc shell"
    "tree":              "ls -lR /cognitive/"
    "Total Commander":   "Plan 9 namespace + rc shell"

  path_mappings:
    "/home/":            "/cognitive/"
    "/documents/":       "/cognitive/atomspace/"
    "/downloads/":       "/cognitive/inference/"
    "/pictures/":        "/cognitive/attention/"
    "/music/":           "/cognitive/learning/"
    "/videos/":          "/cognitive/temporal/"
    "/temp/":            "/cognitive/autognosis/"

# time-crystal-nn → Temporal Hierarchy mappings
tcnn_mappings:
  term_mappings:
    "neuron":            "cognitive service process"
    "synapse":           "9P2000 connection"
    "dendrite":          "import (input namespace)"
    "soma":              "CPU server processing"
    "axon":              "exportfs (output namespace)"
    "oscillation":       "service cycle (sleep/alarm)"
    "phase coupling":    "namespace synchronization (bind)"
    "feedback loop":     "autognosis cycle (/proc read)"
    "rhythm":            "grid heartbeat (/net/tcp)"

  level_mappings:
    0: { name: "atom-ops",       period_ms: 8,    service: "AtomSpace CRUD",    plan9: "/srv read/write" }
    1: { name: "pattern-match",  period_ms: 26,   service: "Pattern matching",  plan9: "grep /cognitive/" }
    2: { name: "inference-step", period_ms: 52,   service: "PLN inference",     plan9: "/cognitive/inference fs" }
    3: { name: "attention-tick", period_ms: 110,  service: "ECAN attention",    plan9: "/cognitive/attention agents" }
    4: { name: "learning-batch", period_ms: 160,  service: "MOSES learning",    plan9: "/cognitive/learning pops" }
    5: { name: "namespace-sync", period_ms: 250,  service: "9P2000 sync",       plan9: "mount/bind across CPUs" }
    6: { name: "grid-pulse",     period_ms: 330,  service: "Grid heartbeat",    plan9: "/net/tcp keepalive" }
    7: { name: "autognosis-obs", period_ms: 500,  service: "Autognosis obs",    plan9: "/proc introspection" }
    8: { name: "self-image",     period_ms: 1000, service: "Self-image rebuild", plan9: "full namespace walk" }

# Promise-Lambda Attention configuration
promise_config:
  lambda_source: plan9-devenv
  kv_source: opencog-plan9
  mechanism: "lambda(KV)^-1"
  promises:
    - plan9-kernel
    - plan9-cc
    - 9p-listener
    - grid-compose
    - cognitive-ns
    - devenv-config
    - autognosis-loop
    - temporal-levels

# Autognosis configuration
autognosis_config:
  levels: 3
  cycle_period_ms: 1000
  convergence_epsilon: 0.001
  introspection_source: "/proc"
  plan9_specific:
    proc_ns: "/proc/*/ns"
    proc_status: "/proc/*/status"

# skill-infinity convergence
convergence:
  type: fixed-point
  equation: "T(system) = system"
  check: "|score(n) - score(n-1)| < epsilon"
  epsilon: 0.001
