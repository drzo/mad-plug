# =============================================================================
# Plan 9 CPU Server Grid — Docker Compose (QEMU-based)
# Deploys N Plan 9 / 9front instances as a 9P2000-connected grid.
# Each node runs Plan 9 inside QEMU within a Docker container.
# =============================================================================
#
# Usage:
#   docker compose -f grid-compose.yml up -d
#   docker compose -f grid-compose.yml --scale plan9-cpu=5 up -d
#   docker compose -f grid-compose.yml down
#

services:
  # --------------------------------------------------------------------------
  # Auth/Name Server (cpu0) — Grid coordinator, factotum, and name registry
  # --------------------------------------------------------------------------
  plan9-registry:
    build:
      context: .
      dockerfile: .plan9-devenv/Dockerfile
    container_name: plan9-registry
    hostname: plan9-registry
    environment:
      - PLAN9=/usr/local/plan9
      - PLAN9_NODE_ID=0
      - PLAN9_NODE_ROLE=auth-server
      - PLAN9_9P_PORT=564
      - PLAN9_IMG=/var/plan9/9front.qcow2
    ports:
      - "564:564"
      - "8080:8080"
    volumes:
      - plan9-registry-data:/var/plan9/data
      - ./:/workspace
    networks:
      plan9-net:
        aliases:
          - auth.plan9cog.local
    command: >
      qemu-system-x86_64 -nographic -m 2G
      -drive file=/var/plan9/9front.qcow2,format=qcow2
      -net nic -net user,hostfwd=tcp::564-:564,hostfwd=tcp::8080-:8080
      -append "console=0 nomp"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo | socat - TCP:localhost:564,connect-timeout=2"]
      interval: 10s
      timeout: 5s
      retries: 3

  # --------------------------------------------------------------------------
  # CPU Server Nodes — Distributed cognitive processing
  # --------------------------------------------------------------------------
  plan9-cpu:
    build:
      context: .
      dockerfile: .plan9-devenv/Dockerfile
    environment:
      - PLAN9=/usr/local/plan9
      - PLAN9_NODE_ROLE=cpu-server
      - PLAN9_REGISTRY=tcp!plan9-registry!564
    volumes:
      - ./:/workspace
    networks:
      - plan9-net
    depends_on:
      plan9-registry:
        condition: service_healthy
    command: >
      qemu-system-x86_64 -nographic -m 1G
      -drive file=/var/plan9/9front.qcow2,format=qcow2
      -net nic -net user,hostfwd=tcp::565-:564
      -append "console=0 nomp"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G

  # --------------------------------------------------------------------------
  # Grid Monitor — Web dashboard for grid status
  # --------------------------------------------------------------------------
  plan9-monitor:
    build:
      context: .
      dockerfile: .plan9-devenv/Dockerfile
    container_name: plan9-monitor
    hostname: plan9-monitor
    environment:
      - PLAN9=/usr/local/plan9
      - PLAN9_NODE_ROLE=stat-server
      - FLASK_APP=/workspace/scripts/grid_monitor.py
      - PLAN9_GRID_NODES=3
    ports:
      - "9090:9090"
    volumes:
      - ./:/workspace
    networks:
      - plan9-net
    depends_on:
      plan9-registry:
        condition: service_healthy
    command: >
      python3 /workspace/scripts/grid_monitor.py

volumes:
  plan9-registry-data:

networks:
  plan9-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
